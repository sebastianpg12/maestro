<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Maestro Animal</title>
    <script>
      // GitHub Pages no soporta rutas de una SPA (react-router) de forma nativa.
      // Este truco redirige cualquier ruta desconocida a index.html preservando
      // la URL original en un query param, que index.html luego restaura.
      var pathSegmentsToKeep = 0
      var l = window.location
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?p=/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      )
    </script>
  </head>
  <body></body>
</html>
